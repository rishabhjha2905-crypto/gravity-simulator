<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gravity Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #030712;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e2e8f0;
      user-select: none;
      overflow: hidden;
    }

    h1 {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #475569;
      margin-bottom: 14px;
    }

    canvas {
      border-radius: 16px;
      display: block;
    }

    .controls {
      margin-top: 18px;
      display: flex;
      align-items: center;
      gap: 18px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 14px;
      padding: 13px 26px;
    }

    .controls label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #64748b;
      white-space: nowrap;
    }

    input[type="number"] {
      width: 130px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      color: #fbbf24;
      font-size: 14px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      padding: 6px 10px;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }

    input[type="number"]:focus {
      border-color: rgba(251, 191, 36, 0.45);
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      opacity: 0.4;
    }

    button {
      background: linear-gradient(135deg, #f97316, #fbbf24);
      border: none;
      border-radius: 8px;
      color: #030712;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 18px;
      cursor: pointer;
      transition: opacity 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 12px rgba(251,191,36,0.3);
    }

    button:hover {
      opacity: 0.88;
      box-shadow: 0 0 20px rgba(251,191,36,0.5);
    }

    button:active {
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <h1>Gravity Simulator</h1>
  <canvas id="canvas"></canvas>
  <div class="controls">
    <label>Star Mass (M☉)</label>
    <input type="number" id="massInput" value="1" min="0.01" step="0.1">
    <button id="launchBtn">Launch Simulation</button>
  </div>

  <script>
    const canvas     = document.getElementById('canvas');
    const ctx        = canvas.getContext('2d');
    const massInput  = document.getElementById('massInput');
    const launchBtn  = document.getElementById('launchBtn');

    // Resize canvas to fit window
    function resize() {
      const size = Math.max(Math.min(window.innerWidth - 40, window.innerHeight - 148), 380);
      canvas.width  = size;
      canvas.height = size;
    }
    resize();
    window.addEventListener('resize', resize);

    // Normalized physics: G = 1
    const G      = 1;
    const M_BASE = 100000;
    let starMass = M_BASE;

    function launch() {
      const solarMasses = parseFloat(massInput.value);
      if (!isFinite(solarMasses) || solarMasses <= 0) return;
      starMass = solarMasses * M_BASE; // 1 M☉ = M_BASE internal units
      time     = 0;
      planets  = createPlanets();
    }

    launchBtn.addEventListener('click', launch);
    massInput.addEventListener('keydown', e => { if (e.key === 'Enter') launch(); });

    // Planet definitions: orbital radius, colour, RGB for alpha gradients, visual radius
    const PLANET_DEFS = [
      { r: 115, color: '#60a5fa', rgb: '96,165,250',   vr: 7 },
      { r: 195, color: '#34d399', rgb: '52,211,153',   vr: 9 },
      { r: 295, color: '#f472b6', rgb: '244,114,182',  vr: 6 },
    ];

    function createPlanets() {
      return PLANET_DEFS.map((def, i) => {
        const angle = (i * 2 * Math.PI) / 3; // space 120° apart
        const speed = Math.sqrt(G * starMass / def.r);
        return {
          x:     def.r * Math.cos(angle),
          y:     def.r * Math.sin(angle),
          vx:   -speed * Math.sin(angle),
          vy:    speed * Math.cos(angle),
          color: def.color,
          rgb:   def.rgb,
          vr:    def.vr,
          trail: [],
        };
      });
    }

    const DT        = 0.1;
    const TRAIL_MAX = 380;
    let   time      = 0;
    let   planets   = createPlanets();

    // Static background star field (relative coords, sampled once)
    const BG_STARS = Array.from({ length: 200 }, () => ({
      rx: Math.random() * 2 - 1,
      ry: Math.random() * 2 - 1,
      r:  Math.random() * 1.3 + 0.2,
      a:  Math.random() * 0.55 + 0.2,
    }));

    // Velocity Verlet integrator for stable, energy-conserving orbits
    function computeAcc(x, y) {
      const dx = -x, dy = -y;
      const r2 = dx * dx + dy * dy;
      const r  = Math.sqrt(r2);
      const f  = G * starMass / r2;
      return { ax: f * dx / r, ay: f * dy / r };
    }

    function stepVerlet(p) {
      const { ax, ay } = computeAcc(p.x, p.y);
      const nx = p.x + p.vx * DT + 0.5 * ax * DT * DT;
      const ny = p.y + p.vy * DT + 0.5 * ay * DT * DT;
      const { ax: ax2, ay: ay2 } = computeAcc(nx, ny);
      p.vx += 0.5 * (ax + ax2) * DT;
      p.vy += 0.5 * (ay + ay2) * DT;
      p.x   = nx;
      p.y   = ny;
    }

    function update() {
      time += 0.018;
      for (const p of planets) {
        stepVerlet(p);
        p.trail.push({ x: p.x, y: p.y });
        if (p.trail.length > TRAIL_MAX) p.trail.shift();
      }
    }

    function draw() {
      const w = canvas.width, h = canvas.height;
      const cx = w / 2, cy = h / 2;

      // Background
      ctx.fillStyle = '#030712';
      ctx.fillRect(0, 0, w, h);

      // Star field
      for (const s of BG_STARS) {
        ctx.beginPath();
        ctx.arc(cx + s.rx * cx * 0.98, cy + s.ry * cy * 0.98, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.a})`;
        ctx.fill();
      }

      // Planet trails
      for (const p of planets) {
        const trail = p.trail;
        if (trail.length < 2) continue;
        const len = trail.length;
        for (let i = 1; i < len; i++) {
          const t = i / len;
          ctx.beginPath();
          ctx.moveTo(cx + trail[i - 1].x, cy + trail[i - 1].y);
          ctx.lineTo(cx + trail[i].x,     cy + trail[i].y);
          ctx.strokeStyle   = p.color;
          ctx.globalAlpha   = t * 0.42;
          ctx.lineWidth     = 0.4 + t * 2.2;
          ctx.stroke();
        }
      }
      ctx.globalAlpha = 1;

      // Star outer diffuse glow — scales slightly with mass and pulses gently
      const massFactor = (starMass / M_BASE) ** 0.28;
      const pulse      = 1 + 0.04 * Math.sin(time * 1.8);
      const glowR      = 95 * massFactor * pulse;

      const starAura = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
      starAura.addColorStop(0,    'rgba(255,220,80,0.38)');
      starAura.addColorStop(0.35, 'rgba(255,150,30,0.14)');
      starAura.addColorStop(0.75, 'rgba(255,90,10,0.05)');
      starAura.addColorStop(1,    'rgba(255,60,0,0)');
      ctx.beginPath();
      ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
      ctx.fillStyle = starAura;
      ctx.fill();

      // Star body
      const starR    = (18 + 7 * massFactor) * pulse;
      const starGrad = ctx.createRadialGradient(cx - 4, cy - 5, 1, cx, cy, starR);
      starGrad.addColorStop(0,    '#ffffff');
      starGrad.addColorStop(0.18, '#fff9d0');
      starGrad.addColorStop(0.55, '#fbbf24');
      starGrad.addColorStop(0.85, '#f97316');
      starGrad.addColorStop(1,    '#ea580c');

      ctx.shadowBlur  = 32;
      ctx.shadowColor = '#fbbf24';
      ctx.beginPath();
      ctx.arc(cx, cy, starR, 0, Math.PI * 2);
      ctx.fillStyle = starGrad;
      ctx.fill();
      ctx.shadowBlur = 0;

      // Planets
      for (const p of planets) {
        const px = cx + p.x;
        const py = cy + p.y;

        // Soft glow halo
        const halo = ctx.createRadialGradient(px, py, 0, px, py, p.vr * 3.2);
        halo.addColorStop(0,   `rgba(${p.rgb},0.35)`);
        halo.addColorStop(0.5, `rgba(${p.rgb},0.1)`);
        halo.addColorStop(1,   `rgba(${p.rgb},0)`);
        ctx.beginPath();
        ctx.arc(px, py, p.vr * 3.2, 0, Math.PI * 2);
        ctx.fillStyle = halo;
        ctx.fill();

        // Planet sphere with specular highlight
        const sphere = ctx.createRadialGradient(
          px - p.vr * 0.38, py - p.vr * 0.38, p.vr * 0.05,
          px, py, p.vr,
        );
        sphere.addColorStop(0,    '#ffffff');
        sphere.addColorStop(0.35, p.color);
        sphere.addColorStop(1,    `rgba(${p.rgb},0.65)`);

        ctx.shadowBlur  = 14;
        ctx.shadowColor = p.color;
        ctx.beginPath();
        ctx.arc(px, py, p.vr, 0, Math.PI * 2);
        ctx.fillStyle = sphere;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
